repos:
  - repo: local
    hooks:
      - id: go-fmt
        name: gofmt
        entry: gofmt
        args: [-w]
        language: system
        files: \.go$

      - id: go-vet
        name: go vet
        entry: go
        args: [vet, ./...]
        language: system
        files: \.go$
        pass_filenames: false

      - id: go-build
        name: go build
        entry: go
        args: [build, ./...]
        language: system
        files: \.go$
        pass_filenames: false
